<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


  <link rel="stylesheet" href="style.css">
  <script type="module" src="main.js"></script>
  <!-- esportazione pdf -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <style>
   .riga { display: flex;    align-items: center;   width: 100%;    gap: 10px; /* opzionale */}
   .ver {  flex: 0 0 auto; /* larghezza naturale */}
   .titolo { flex: 1 1 auto; /* occupa tutto lo spazio disponibile */    max-width: 90%; /* opzionale se vuoi forzare il limite */}
   .data { flex: 0 0 auto; /* larghezza naturale */  white-space: nowrap; /* evita che la data vada a capo */}
   .data_partita {display: flex; align-items:center;   width: 100%;     gap: 8px;          /* distanza tra gli elementi */ white-space: nowrap; /* impedisce l'andare a capo */}
  </style>

  <link rel="stylesheet" href="sostituzioni.css"><!-- v2.3-->
  <script type="module" src="sostituzioni.js"></script><!-- v2.3 -->

</head>

<body>
<div class="riga">
    <div class="ver">ver. 2.3 - sostituzioni </div>
    <div class="titolo">  <h2>📊 Statistiche Partita</h2></div>
    <div class="data">21/03/2026</div>
</div>


  <!-- Data partita -->
  <div class="data_partita">
    <label for="dataPartita">Data partita:</label>
    <input type="date" id="dataPartita">
    <h3 id="dataDisplay"></h3>
  </div>

  <!-- Categoria, Girone, Note -->
  <div class="meta-partita">
    <div>
      <label for="categoriaPartita">Categoria:</label>
      <input type="text" id="categoriaPartita" placeholder="Es. Under 15, Prima Categoria">
    </div>

    <div>
      <label for="gironePartita">Girone:</label>
      <input type="text" id="gironePartita" placeholder="Es. Girone A">
    </div>

    <div class="note-box">
      <label for="notePartita">Note:</label>
      <textarea id="notePartita" placeholder="Annotazioni varie..." rows="2"></textarea>
    </div>
  </div>


  <!-- Sezione squadre -->
  <div class="squadre">
    <div>
      <label for="squadraLocali">Locali:</label>
      <input type="text" id="squadraLocali" placeholder="Nome squadra locali">
    </div>

    <div>
      <label for="squadraOspiti">Ospiti:</label>
      <input type="text" id="squadraOspiti" placeholder="Nome squadra ospiti">
    </div>
  </div>


  <!-- Timer -->
  <div class="timer-container">
    <button id="btnStart">▶️ Start</button>
    <button id="btnPausa">⏸️ Pausa</button>
    <button id="btnStop">⏹️ Stop</button>
    <button id="btnReset">🔄 Reset</button>
    <span id="cronometro">00:00</span>
  </div>



  <!-- Tempi -->
  <div class="tempi-container">
    <button id="btnT1">1° Tempo</button>
    <button id="btnT2" disabled>2° Tempo</button>
    <span id="tempoCorrente">Tempo: 1</span>
  </div>


  <h2>Risultato Partita</h2>
  <div id="risultatoPartita"></div>



  <!-- Eventi affiancati -->
  <h3>Eventi</h3>
  <div class="eventi-container">
    <div class="colonna-eventi">
      <h4>Locali</h4>
      <div class="eventi-locali">
        <div class="col-loc-1"></div>
        <div class="col-loc-2"></div>
        <div class="col-loc-full"></div>
      </div>
    </div>

    <div class="colonna-eventi">
      <h4>Ospiti</h4>
      <div class="eventi-ospiti">
        <div class="col-osp-1"></div>
        <div class="col-osp-2"></div>
        <div class="col-osp-full"></div>
      </div>
    </div>
  </div>


  <section id="gestione-sostituzioni"><!-- v2.3 -->
  <h2>Formazione titolari (1–11)</h2>
  <div id="titolari" class="griglia-giocatori">
    <button class="btn-titolare" data-num="1">1</button>
    <button class="btn-titolare" data-num="2">2</button>
    <button class="btn-titolare" data-num="3">3</button>
    <button class="btn-titolare" data-num="4">4</button>
    <button class="btn-titolare" data-num="5">5</button>
    <button class="btn-titolare" data-num="6">6</button>
    <button class="btn-titolare" data-num="7">7</button>
    <button class="btn-titolare" data-num="8">8</button>
    <button class="btn-titolare" data-num="9">9</button>
    <button class="btn-titolare" data-num="10">10</button>
    <button class="btn-titolare" data-num="11">11</button>
  </div>

  <h2>Riserve (12–18)</h2>
  <div id="riserve" class="griglia-giocatori">
    <button class="btn-riserva" data-num="12">12</button>
    <button class="btn-riserva" data-num="13">13</button>
    <button class="btn-riserva" data-num="14">14</button>
    <button class="btn-riserva" data-num="15">15</button>
    <button class="btn-riserva" data-num="16">16</button>
    <button class="btn-riserva" data-num="17">17</button>
    <button class="btn-riserva" data-num="18">18</button>
  </div>

  <h3>Eventi sostituzioni</h3>
  <div id="eventiSostituzioni"></div>
</section>



  <!-- Totali per tipo di evento -->
  <h2>Totali per tipo di evento</h2>
  <div id="riepilogoTotali"></div>

  <div id="tabellaEventi"></div>

  <!-- Eventi ogni 15 minuti -->
  <h2>Eventi ogni 15 minuti</h2>
  <div id="tabella15"></div>

  <!-- Timeline con filtri -->
  <h2>Timeline eventi</h2>
  <div id="filtriTimeline" class="filtri">
    <select id="filtroSquadra">
      <option value="tutte">Tutte le squadre</option>
      <option value="locali">Locali</option>
      <option value="ospiti">Ospiti</option>
      <option value="sistema">Sistema</option>
    </select>

    <select id="filtroTempo">
      <option value="tutti">Tutti i tempi</option>
      <option value="1">1° Tempo</option>
      <option value="2">2° Tempo</option>
    </select>

    <select id="filtroEvento">
      <option value="tutti">Tutti gli eventi</option>
      <option value="TP">Tiro in Porta</option>
      <option value="TF">Tiro Fuori</option>
      <option value="FF">Fallo Fatto</option>
      <option value="FS">Fallo Subito</option>
      <option value="PF">Passaggio Buono</option>
      <option value="PX">Passaggio Sbagliato</option>
      <option value="GOL">Gol</option>
      <option value="CNL">Corner Locali</option>
      <option value="CNO">Corner Ospiti</option>
      <option value="PAUSA">Pausa</option>
    </select>
  </div>
  <div id="timelineEventi"></div>




  <!-- Heatmap temporale -->
  <h2>Heatmap temporale eventi</h2>
  <div id="heatmapEventi"></div>

  <!-- Momentum -->
  <h2>Momentum</h2>
  <div id="momentumEventi"></div>

  <!-- Log eventi grezzo -->
  <h2>Log eventi</h2>
  <div id="logEventi"></div>

  <!-- Azioni finali -->
  <div class="azioni">
    <button id="btnCSV">💾 Salva CSV</button>
    <button id="btnJSON">💾 Salva JSON</button>
    <button id="btnGoogle">📤 Invia a Google Sheets</button>
    <button id="btnPDF">📄 Esporta PDF</button>
  </div>
</body>
</html>
