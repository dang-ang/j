<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>JCR Analytics - Top 21 Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Top21 + filtro */
        .top-section {
        display:flex;
        gap:16px;
        align-items:flex-start;
        margin-bottom:12px;
        flex-wrap:wrap;
        }
        .top21-box {
        flex:1 1 320px;
        min-width:220px;
        }
        .filter-box {
        width:220px;
        }

        /* Griglia 4 colonne per i risultati */
        #results-4cols {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-top: 12px;
        }
        .results-col {
        border: 1px solid #e6e6e6;
        border-radius: 8px;
        padding: 8px;
        background: #fff;
        font-family: Arial, sans-serif;
        font-size: 13px;
        min-height: 40px;
        }
        .results-col h4 { margin: 0 0 8px 0; font-size: 14px; }
        .results-item {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid #f1f1f1;
        }
        .results-item:last-child { border-bottom: none; }
        .results-item img { width:28px; height:28px; object-fit:contain; border-radius:4px; background:#fff; }
        .results-meta { font-size:12px; color:#666; display:flex; gap:8px; margin-top:4px; flex-wrap:wrap; }
        .results-squadra { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width: 160px; display:inline-block; vertical-align:middle; }
        .results-punti { font-weight:700; margin-left:8px; white-space:nowrap; }
        .highlight-jcr { background: linear-gradient(90deg, rgba(255,250,230,0.6), transparent); border-radius:4px; padding:2px 4px; }
        #results-4cols-info { margin-top:8px; color:#a00; font-size:13px; }

        /* responsive */
        @media (max-width: 900px) { #results-4cols { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px) { #results-4cols { grid-template-columns: 1fr; } }

    </style>
</head>

      <option value="ALL">Tutti i Gironi</option>
      <!-- opzioni popolate dinamicamente da updateGironeFilter() -->
    </select>
  </div>
</div>

<!-- Sezione risultati: la tabella verticale originale verrà nascosta -->

            const select = document.getElementById('filter-girone');

            select.innerHTML = '<option value="ALL">Tutti i Gironi</option>';

        }

        function sortBy(col) {
            if (sortColumn === col) sortDirection *= -1;
            else { sortColumn = col; sortDirection = -1; }
            renderTable();
        }

        // Manteniamo funzioni vuote per compatibilità
        function updateCheckboxes() { /* checkbox rimossi */ }
        function toggleAll(status) { /* checkbox rimossi */ }

        // Parametri layout
        const MAX_ROWS_PER_COL = 20;
        const NUM_COLS = 4;
        const MAX_ITEMS = MAX_ROWS_PER_COL * NUM_COLS; // 80

        // Aggiorna select gironi (usa categorie già calcolate)
        function updateGironeFilter() {
            const select = document.getElementById('filter-girone');
            const gironi = [...new Set(classificaData.filter(d => d.Categoria === currentCategory).map(d => d.Girone))].sort();
            select.innerHTML = '<option value="ALL">Tutti i Gironi</option>';
            gironi.forEach(g => { select.innerHTML += `<option value="${g}">Girone ${g}</option>`; });
        }

        // Funzione principale: crea Top21 e griglia 4 colonne (round-robin)
        function renderTable() {
            const gironeFiltro = document.getElementById('filter-girone') ? document.getElementById('filter-girone').value : "ALL";
            const tbody = document.getElementById('table-body'); // tabella originale (verrà nascosta)
            const top21Container = document.getElementById('top21-stats');

            // 1. Normalizza dati categoria
            let allTeamsInCat = classificaData
                .filter(d => d.Categoria === currentCategory)
                .map(d => {
                    const pts = parseInt(d.Punti) || 0;
                    const pg = parseInt(d.PG) || 0;
                    return { ...d, Punti: pts, PG: pg, DR: (parseInt(d.GF || d.FG) || 0) - (parseInt(d.GS) || 0), Media: pg > 0 ? (pts / pg).toFixed(2) : "0.00" };
                });

            // 2. Top21 generale e stats per girone
            const top21Generale = [...allTeamsInCat]
                .sort((a, b) => b.Punti - a.Punti || b.DR - a.DR)
                .slice(0, 21);

            const statsGirone = {};
            top21Generale.forEach(t => { statsGirone[t.Girone] = (statsGirone[t.Girone] || 0) + 1; });

            top21Container.innerHTML = Object.entries(statsGirone)
                .sort((a, b) => b[1] - a[1])
                .map(([girone, count]) => `
                    <div class="flex justify-between items-center bg-white/10 p-2 rounded-lg">
                        <span class="font-bold">Girone ${girone}</span>
                        <span class="bg-white text-blue-700 px-3 py-0.5 rounded-full font-black text-sm">${count} sq.</span>
                    </div>
                `).join('');

            // 3. Filtri: tutte le squadre della categoria, eventualmente filtrate per girone
            let filtered = allTeamsInCat.filter(d => (gironeFiltro === "ALL" || d.Girone === gironeFiltro));

            // Ranking interno ai gironi
            const gironiList = [...new Set(filtered.map(d => d.Girone))];
            const rankings = {};
            gironiList.forEach(g => {
                rankings[g] = allTeamsInCat.filter(team => team.Girone === g).sort((a, b) => b.Punti - a.Punti || b.DR - a.DR);
            });

            filtered = filtered.map(team => {
                const posInG = rankings[team.Girone].findIndex(t => t.Squadra === team.Squadra) + 1;
                let qual = "";
                if (posInG === 1) qual = '<span class="qual-x">X</span>';
                else if (posInG === 2) qual = '<span class="qual-xx">XX</span>';
                else if (posInG === 3) qual = '<span class="qual-xxx">XXX</span>';
                return { ...team, PosGirone: posInG, Qual: qu
                     al };
            });

            // Ordinamento
            filtered.sort((a, b) => {
                let valA = a[sortColumn], valB = b[sortColumn];
                return (typeof valA === 'string' ? valA.localeCompare(valB) : valA - valB) * sortDirection;
            });

            // 4. Costruisci elementi per visualizzazione a colonne (round-robin)
            const items = filtered.map((d) => {
                const isJCR = d.Squadra.toUpperCase().includes('JCR');
                const drColor = d.DR > 0 ? 'text-green-600' : (d.DR < 0 ? 'text-red-600' : 'text-slate-400');
                return {
                    html: `
                        <div class="results-item ${isJCR ? 'highlight-jcr' : ''}">
                            ${d.Logo ? `<img src="${d.Logo}" onerror="this.style.display='none'">` : ''}
                            <div style="flex:1;min-width:0">
                            <div style="display:flex;justify-content:space-between;align-items:center">
                                <span class="results-squadra">${escapeHtml(d.Squadra)}</span>
                                <span class="results-punti">${d.Punti}</span>
                            </div>
                            <div class="results-meta">
                                <span>G${d.Girone}</span>
                                <span>PosG:${d.PosGirone}</span>
                                <span class="${drColor}">DR:${d.DR>0? '+'+d.DR : d.DR}</span>
                            </div>
                            </div>
                        </div>
                    `
                };
            });

            // 5. Limita e distribuisci verticalmente (round-robin)
            const itemsToShow = items.slice(0, MAX_ITEMS);

            // Nascondi la tabella verticale originale per evitare duplicati
            if (tbody) {
                const tableEl = tbody.closest('table');
                if (tableEl) tableEl.style.display = 'none';
                else tbody.style.display = 'none';
            }

            // Crea/aggiorna contenitore 4 colonne
            let resultsContainer = document.getElementById('results-4cols');
            if (!resultsContainer) {
                resultsContainer = document.createElement('div');
                resultsContainer.id = 'results-4cols';
                const resultsArea = document.getElementById('results-area');
                if (resultsArea) resultsArea.appendChild(resultsContainer);
                else document.body.appendChild(resultsContainer);
            }
            resultsContainer.innerHTML = '';

            // Prepara array di colonne vuote e distribuisci round-robin
            const cols = Array.from({length: NUM_COLS}, () => []);
            itemsToShow.forEach((it, idx) => { cols[idx % NUM_COLS].push(it); });

            // Costruisci DOM colonne
            for (let c = 0; c < NUM_COLS; c++) {
                const col = document.createElement('div');
                col.className = 'results-col';
                col.innerHTML = `<h4>Colonna ${c+1}</h4>`;
                if (cols[c].length === 0) {
                    col.innerHTML += `<div style="color:#666">—</div>`;
                } else {
                    const inner = document.createElement('div');
                    inner.innerHTML = cols[c].map(it => it.html).join('');
                    col.appendChild(inner);
                }
                resultsContainer.appendChild(col);
            }

            // 6. Messaggio informativo
            let info = document.getElementById('results-4cols-info');
            if (!info) {
                info = document.createElement('div');
                info.id = 'results-4cols-info';
                if (resultsContainer.parentNode) resultsContainer.parentNode.insertBefore(info, resultsContainer.nextSibling);
                else document.body.appendChild(info);
            }
            info.textContent = items.length > MAX_ITEMS
                ? `Mostrati i primi ${MAX_ITEMS} elementi su ${items.length}.`
                : `Mostrati ${itemsToShow.length} elementi.`;
        }

        // Utility: escape HTML per sicurezza
        function escapeHtml(str) {
        return String(str || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
        }

        
        init();
    </script>
